<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8C97A"/>
      <stop offset="100%" stop-color="#D4830A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="#0A0A0A"/>

  <!-- Hexagonal grid background (subtle) -->
  <!-- Large center hex -->
  <polygon points="200,60 260,95 260,165 200,200 140,165 140,95" fill="none" stroke="rgba(245,176,65,0.12)" stroke-width="1.5"/>
  <!-- Ring hexagons -->
  <polygon points="200,200 260,235 260,305 200,340 140,305 140,235" fill="none" stroke="rgba(245,176,65,0.08)" stroke-width="1"/>
  <polygon points="260,95 320,130 320,200 260,235 200,200 200,130" fill="none" stroke="rgba(245,176,65,0.08)" stroke-width="1"/>
  <polygon points="140,95 200,130 200,200 140,235 80,200 80,130" fill="none" stroke="rgba(245,176,65,0.08)" stroke-width="1"/>
  <!-- Corner hex small -->
  <polygon points="320,130 360,153 360,200 320,225 280,200 280,153" fill="none" stroke="rgba(245,176,65,0.05)" stroke-width="1"/>
  <polygon points="80,130 120,153 120,200 80,225 40,200 40,153" fill="none" stroke="rgba(245,176,65,0.05)" stroke-width="1"/>
  <polygon points="200,60 240,83 240,130 200,153 160,130 160,83" fill="none" stroke="rgba(245,176,65,0.05)" stroke-width="1"/>
  <polygon points="200,247 240,270 240,317 200,340 160,317 160,270" fill="none" stroke="rgba(245,176,65,0.05)" stroke-width="1"/>

  <!-- Glowing accent nodes at hex intersections -->
  <circle cx="200" cy="60" r="3" fill="#F5B041" opacity="0.7" filter="url(#glow)"/>
  <circle cx="260" cy="95" r="2.5" fill="#F5B041" opacity="0.5"/>
  <circle cx="140" cy="95" r="2.5" fill="#F5B041" opacity="0.5"/>
  <circle cx="260" cy="165" r="2" fill="#F5B041" opacity="0.4"/>
  <circle cx="140" cy="165" r="2" fill="#F5B041" opacity="0.4"/>
  <circle cx="200" cy="200" r="3" fill="#F8C97A" opacity="0.6" filter="url(#glow)"/>
  <circle cx="320" cy="130" r="2" fill="#F5B041" opacity="0.35"/>
  <circle cx="80" cy="130" r="2" fill="#F5B041" opacity="0.35"/>

  <!-- Main glowing hex frame -->
  <polygon points="200,75 272,117 272,200 200,243 128,200 128,117"
    fill="rgba(245,176,65,0.04)" stroke="url(#goldGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- F letter -->
  <rect x="118" y="138" width="11" height="80" rx="4" fill="url(#goldGrad)"/>
  <rect x="118" y="138" width="52" height="11" rx="4" fill="url(#goldGrad)"/>
  <rect x="118" y="169" width="40" height="10" rx="4" fill="url(#goldGrad)" opacity="0.85"/>

  <!-- Dash separator -->
  <rect x="180" y="173" width="18" height="9" rx="4" fill="#F8C97A" opacity="0.7"/>

  <!-- B letter -->
  <rect x="208" y="138" width="11" height="80" rx="3" fill="url(#goldGrad)"/>
  <path d="M219 138 Q248 138 248 155 Q248 172 219 172 Z" fill="url(#goldGrad)"/>
  <path d="M219 172 Q252 172 252 192 Q252 218 219 218 Z" fill="url(#goldGrad)"/>

  <!-- i letter (lowercase stylized) -->
  <rect x="262" y="155" width="10" height="9" rx="4" fill="#F8C97A"/>
  <rect x="262" y="170" width="10" height="48" rx="4" fill="url(#goldGrad)"/>

  <!-- Tagline text area -->
  <text x="200" y="295" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="2" fill="rgba(245,176,65,0.9)">FREAKIN</text>
  <text x="200" y="318" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="3" fill="rgba(248,201,122,0.65)">BUSINESS INTELLIGENCE</text>

  <!-- Decorative corner dots -->
  <circle cx="50" cy="50" r="4" fill="#F5B041" opacity="0.3"/>
  <circle cx="350" cy="50" r="4" fill="#F5B041" opacity="0.3"/>
  <circle cx="50" cy="350" r="4" fill="#F5B041" opacity="0.3"/>
  <circle cx="350" cy="350" r="4" fill="#F5B041" opacity="0.3"/>
</svg>
