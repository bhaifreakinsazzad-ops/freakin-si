<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Dark navy background -->
  <rect width="40" height="40" rx="8" fill="#0F1820"/>

  <!-- Circuit trace lines -->
  <line x1="4" y1="10" x2="9" y2="10" stroke="#F5B041" stroke-width="0.8" opacity="0.4"/>
  <line x1="31" y1="10" x2="36" y2="10" stroke="#F5B041" stroke-width="0.8" opacity="0.4"/>
  <line x1="4" y1="30" x2="9" y2="30" stroke="#F5B041" stroke-width="0.8" opacity="0.4"/>
  <line x1="10" y1="4" x2="10" y2="9" stroke="#F5B041" stroke-width="0.8" opacity="0.4"/>
  <line x1="30" y1="4" x2="30" y2="9" stroke="#F5B041" stroke-width="0.8" opacity="0.4"/>
  <line x1="10" y1="31" x2="10" y2="36" stroke="#F5B041" stroke-width="0.8" opacity="0.4"/>

  <!-- Circuit nodes at corners -->
  <circle cx="4" cy="10" r="1.2" fill="#F5B041" opacity="0.5"/>
  <circle cx="36" cy="10" r="1.2" fill="#F5B041" opacity="0.5"/>
  <circle cx="4" cy="30" r="1.2" fill="#F5B041" opacity="0.5"/>
  <circle cx="10" cy="4" r="1.2" fill="#F5B041" opacity="0.5"/>

  <!-- B letterform -->
  <path d="M8 11 L8 29 L15 29 C17.8 29 19.5 27.6 19.5 25 C19.5 23.1 18.4 22 16.8 21.5 C18.2 20.9 19 19.8 19 17.8 C19 15.1 17.2 11 13.5 11 Z" fill="url(#biGold)"/>
  <rect x="10.5" y="13" width="3" height="6" rx="1" fill="#0F1820"/>
  <rect x="10.5" y="21" width="3.5" height="6" rx="1" fill="#0F1820"/>

  <!-- I letterform -->
  <rect x="21.5" y="11" width="3" height="18" rx="1.5" fill="url(#biGold)"/>
  <rect x="19.5" y="11" width="7" height="2.5" rx="1" fill="url(#biGold)"/>
  <rect x="19.5" y="26.5" width="7" height="2.5" rx="1" fill="url(#biGold)"/>

  <!-- Upward arrow (top-right) -->
  <path d="M30 17 L33 11 L36 17" stroke="#F8C97A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="33" y1="11" x2="33" y2="20" stroke="#F8C97A" stroke-width="1.6" stroke-linecap="round"/>

  <defs>
    <linearGradient id="biGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8C97A"/>
      <stop offset="100%" stop-color="#D4830A"/>
    </linearGradient>
  </defs>
</svg>
